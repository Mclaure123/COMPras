<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ahorro Inteligente V3.0 PRO</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* ==========================================
           VARIABLES Y TEMA OSCURO/CLARO
           ========================================== */
        :root {
            --bg-color: #f0f4f8; --text-color: #2d3748; --card-bg: #ffffff;
            --primary-color: #3182ce; --primary-hover: #2b6cb0;
            --success-color: #38a169; --danger-color: #e53e3e; --warning-color: #dd6b20;
            --nav-bg: #ffffff; --border-color: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.12); --shadow-md: 0 4px 6px rgba(0,0,0,0.1);
            --radius: 12px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a202c; --text-color: #e2e8f0; --card-bg: #2d3748;
                --primary-color: #4299e1; --primary-hover: #3182ce;
                --success-color: #48bb78; --danger-color: #fc8181;
                --nav-bg: #2d3748; --border-color: #4a5568;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding-bottom: 80px; }
        main { padding: 20px; max-width: 800px; margin: 0 auto; margin-top: 40px; }
        .vista { display: none; animation: fadeIn 0.3s ease; }
        .vista.activa { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow-md); margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.95em; }
        input, select, button { width: 100%; padding: 14px; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--bg-color); color: var(--text-color); font-size: 16px; }
        button { background-color: var(--primary-color); color: white; border: none; font-weight: bold; cursor: pointer; box-shadow: var(--shadow-sm); }
        button:hover { background-color: var(--primary-hover); }
        
        .scan-container { display: flex; gap: 10px; }
        .scan-container input { flex: 1; }
        .scan-container button { width: auto; background-color: var(--success-color); }
        #reader { width: 100%; margin-top: 10px; border-radius: 8px; overflow: hidden; border: 2px dashed var(--primary-color); }
        
        /* LED CON ANIMACIÓN DE PULSO */
        .led-container { position: fixed; top: 10px; left: 10px; z-index: 4000; display: flex; align-items: center; gap: 8px; background: var(--card-bg); padding: 6px 12px; border-radius: 20px; box-shadow: var(--shadow-md); font-size: 0.85em; font-weight: bold; border: 1px solid var(--border-color); }
        .led { width: 12px; height: 12px; border-radius: 50%; animation: latido 1.2s infinite; }
        .led.rojo { background-color: var(--danger-color); box-shadow: 0 0 8px var(--danger-color); }
        .led.verde { background-color: var(--success-color); box-shadow: 0 0 8px var(--success-color); }
        @keyframes latido { 0% { transform: scale(0.9); opacity: 0.8; } 50% { transform: scale(1.3); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.8; } }

        .mensaje-toast { display: none; background: var(--success-color); color: white; text-align: center; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; position: sticky; top: 60px; z-index: 3000; box-shadow: var(--shadow-md); }

        /* MATRIZ */
        .tabla-container { width: 100%; overflow-x: auto; background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow-md); }
        .tabla { border-collapse: collapse; width: max-content; min-width: 100%; }
        .tabla th, .tabla td { padding: 12px; border: 1px solid var(--border-color); text-align: center; }
        .tabla th:first-child, .tabla td:first-child { position: sticky; left: 0; background-color: var(--card-bg); z-index: 2; text-align: left; font-weight: bold; }
        .tabla th { background-color: var(--nav-bg); }
        .mejor-precio { background-color: rgba(72, 187, 120, 0.25) !important; border: 2px solid var(--success-color); font-weight: bold; }

        /* CARRITO (CANTIDAD Y DECIMALES) */
        .cart-item { border-bottom: 1px solid var(--border-color); padding: 15px 0; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .cart-controls { display: flex; align-items: center; gap: 5px; background: var(--bg-color); border-radius: 8px; padding: 2px; }
        .cart-controls button { width: 35px; height: 35px; padding: 0; border-radius: 6px; font-size: 1.2em; background: var(--primary-color); }
        .cart-controls input { width: 60px; text-align: center; padding: 5px; border: none; background: transparent; font-weight: bold; }
        .cart-select { padding: 8px; font-size: 0.9em; width: 100%; border-radius: 8px; }

        /* NAVEGACIÓN */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; background-color: var(--nav-bg); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); z-index: 1000; }
        .nav-btn { background: transparent; color: var(--text-color); border: none; font-size: 0.7em; display: flex; flex-direction: column; align-items: center; opacity: 0.5; padding: 5px; width: 20%; }
        .nav-btn.activo { opacity: 1; color: var(--primary-color); font-weight: bold; }
        .nav-icon { font-size: 1.5em; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="led-container">
        <div id="led-circulo" class="led rojo"></div>
        <span id="led-texto">Offline</span>
    </div>

    <main>
        <div id="mensaje-exito" class="mensaje-toast">¡Acción exitosa!</div>

        <section id="vista-auth" class="vista activa">
            <h2 style="margin-bottom: 15px; text-align: center;">Acceso Seguro</h2>
            <p style="text-align: center; opacity: 0.8; margin-bottom: 20px;">Conéctate para sincronizar tus precios en Supabase.</p>
            <div class="card">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="auth-email" placeholder="tu@correo.com">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="auth-pass" placeholder="******">
                </div>
                <button onclick="iniciarSesion()" style="margin-bottom: 10px;">🔐 Iniciar Sesión</button>
                <button onclick="registrarse()" style="background: transparent; color: var(--primary-color); border: 2px solid var(--primary-color);">Crear Cuenta Nueva</button>
            </div>
        </section>

        <section id="vista-ingreso" class="vista">
            <h2 style="margin-bottom: 15px;">Añadir Registro</h2>
            <div class="card">
                <form id="form-producto">
                    <div class="form-group">
                        <label>📷 Código de Barras</label>
                        <div class="scan-container">
                            <input type="text" id="input-codigo" placeholder="Opcional">
                            <button type="button" id="btn-escanear">Escanear</button>
                        </div>
                        <div id="reader" style="display:none;"></div>
                    </div>
                    
                    <div class="form-group">
                        <label>🛒 Producto *</label>
                        <select id="select-producto" required></select>
                        <input type="text" id="input-nuevo-producto" placeholder="Nombre" style="display:none; margin-top:10px;">
                    </div>

                    <div class="form-group" id="grupo-categoria" style="display:none;">
                        <label>🏷️ Categoría</label>
                        <select id="select-categoria"></select>
                        <input type="text" id="input-nueva-categoria" placeholder="Nombre" style="display:none; margin-top:10px;">
                    </div>

                    <div class="form-group">
                        <label>🏪 Lugar *</label>
                        <select id="select-lugar" required></select>
                        <input type="text" id="input-nuevo-lugar" placeholder="Nombre" style="display:none; margin-top:10px;">
                    </div>

                    <div class="form-group">
                        <label>💰 Precio Unitario/Kilo (Bs.) *</label>
                        <input type="number" id="input-precio" step="0.01" required>
                    </div>
                    <button type="submit">💾 Guardar Precio</button>
                </form>
            </div>
        </section>

        <section id="vista-matriz" class="vista">
            <h2 style="margin-bottom: 10px;">Comparador</h2>
            <input type="text" id="input-busqueda-matriz" style="margin-bottom: 15px; border: 2px solid var(--primary-color);" placeholder="🔍 Buscar producto..." oninput="renderizarMatriz()">
            <div class="tabla-container">
                <table class="tabla" id="tabla-matriz"></table>
            </div>
        </section>

        <section id="vista-carrito" class="vista">
            <h2 style="margin-bottom: 10px;">🛒 Lista de Compras</h2>
            <div class="form-group">
                <select id="select-agregar-carrito" onchange="agregarAlCarrito()">
                    <option value="">+ Añadir a la lista...</option>
                </select>
            </div>
            <div class="card" style="padding: 0;">
                <div id="lista-carrito-items" style="padding: 15px;"></div>
                <div style="padding: 15px; background: rgba(0,0,0,0.05); text-align: right; border-top: 1px solid var(--border-color);">
                    <h3>Total Estimado: <span id="total-carrito" style="color:var(--success-color);">Bs. 0.00</span></h3>
                </div>
            </div>
        </section>

        <section id="vista-ajustes" class="vista">
            <h2 style="margin-bottom: 20px;">⚙️ Ajustes</h2>
            <div class="card">
                <h3 style="margin-bottom: 10px;">Cuenta Activa</h3>
                <p id="info-usuario" style="margin-bottom: 15px; font-weight: bold; color: var(--primary-color);">Cargando...</p>
                <button onclick="cerrarSesion()" style="background: var(--danger-color);">Cerrar Sesión</button>
            </div>
        </section>
    </main>

    <nav id="menu-principal" style="display: none;">
        <button class="nav-btn activa" onclick="cambiarVista('vista-ingreso', this)"><span>➕</span><span>Ingreso</span></button>
        <button class="nav-btn" onclick="cambiarVista('vista-matriz', this)"><span>📈</span><span>Comparar</span></button>
        <button class="nav-btn" onclick="cambiarVista('vista-carrito', this)"><span>🛒</span><span>Carrito</span></button>
        <button class="nav-btn" onclick="cambiarVista('vista-ajustes', this)"><span>⚙️</span><span>Ajustes</span></button>
    </nav>

    <script>
        // ==========================================
        // 1. INICIALIZACIÓN DE SUPABASE (CREDENCIALES EXACTAS)
        // ==========================================
        const supabaseUrl = 'https://iwuglirgkvnobhatgedq.supabase.co';
        const supabaseKey = 'sb_publishable_sNgWni9L5DWroTgEPKhKQw_cST-OXxR';
        const options = {
            auth: { persistSession: true, autoRefreshToken: true },
            realtime: { eventsPerSecond: 10 }
        };
        const clienteSupabase = supabase.createClient(supabaseUrl, supabaseKey, options);

        // ==========================================
        // 2. ESTADO LOCAL (OFFLINE-FIRST)
        // ==========================================
        let productos = JSON.parse(localStorage.getItem('productosAhorro')) || [];
        let catalogoProductos = JSON.parse(localStorage.getItem('catalogoAhorro')) || [];
        let lugares = JSON.parse(localStorage.getItem('lugaresAhorro')) || [{nombre: 'Supermercado Norte', activo: true}];
        let categorias = JSON.parse(localStorage.getItem('categoriasAhorro')) || ['Lácteos', 'Carnes', 'General'];
        let carrito = JSON.parse(localStorage.getItem('carritoActual')) || []; // {producto, lugarSeleccionado, cantidad}

        let usuarioActual = null;
        let isOnline = navigator.onLine;

        // ==========================================
        // 3. LÓGICA DEL LED Y SINCRONIZACIÓN
        // ==========================================
        function actualizarLED() {
            const led = document.getElementById('led-circulo');
            const txt = document.getElementById('led-texto');
            if (isOnline && usuarioActual) {
                led.className = 'led verde'; txt.textContent = 'Sync OK';
                sincronizarDatosPendientes();
            } else {
                led.className = 'led rojo'; txt.textContent = !isOnline ? 'Sin Internet' : 'Sin Sesión';
            }
        }

        window.addEventListener('online', () => { isOnline = true; actualizarLED(); });
        window.addEventListener('offline', () => { isOnline = false; actualizarLED(); });

        async function sincronizarDatosPendientes() {
            // Empuja los registros marcados como "synced: false"
            const pendientes = productos.filter(p => !p.synced);
            if(pendientes.length === 0) return;

            for (let reg of pendientes) {
                const { error } = await clienteSupabase.from('Bar_Historial').insert([{
                    lugar: reg.lugar, nombre_producto: reg.nombre, codigo: reg.codigo, precio: reg.precio, fecha: reg.fecha
                }]);
                if (!error) {
                    reg.synced = true; // Marcar como sincronizado localmente
                }
            }
            localStorage.setItem('productosAhorro', JSON.stringify(productos));
        }

        // ==========================================
        // 4. AUTENTICACIÓN
        // ==========================================
        clienteSupabase.auth.onAuthStateChange((event, session) => {
            usuarioActual = session?.user || null;
            if (usuarioActual) {
                document.getElementById('vista-auth').classList.remove('activa');
                document.getElementById('vista-ingreso').classList.add('activa');
                document.getElementById('menu-principal').style.display = 'flex';
                document.getElementById('info-usuario').textContent = usuarioActual.email;
                renderizarListas(); renderizarMatriz(); actualizarVistaCarrito();
            } else {
                document.querySelectorAll('.vista').forEach(v => v.classList.remove('activa'));
                document.getElementById('vista-auth').classList.add('activa');
                document.getElementById('menu-principal').style.display = 'none';
            }
            actualizarLED();
        });

        async function registrarse() {
            const email = document.getElementById('auth-email').value; const password = document.getElementById('auth-pass').value;
            const { error } = await clienteSupabase.auth.signUp({ email, password });
            if(error) alert('Error: ' + error.message); else alert('Registro exitoso. Revisa tu correo o inicia sesión.');
        }

        async function iniciarSesion() {
            const email = document.getElementById('auth-email').value; const password = document.getElementById('auth-pass').value;
            const { error } = await clienteSupabase.auth.signInWithPassword({ email, password });
            if(error) alert('Error: Credenciales incorrectas.');
        }

        async function cerrarSesion() { await clienteSupabase.auth.signOut(); }

        // ==========================================
        // 5. NAVEGACIÓN Y COMPONENTES
        // ==========================================
        function cambiarVista(id, btn) {
            document.querySelectorAll('.vista').forEach(v => v.classList.remove('activa'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('activo'));
            document.getElementById(id).classList.add('activa'); btn.classList.add('activo');
            if(id === 'vista-matriz') renderizarMatriz();
            if(id === 'vista-carrito') actualizarVistaCarrito();
        }

        function mostrarToast(mensaje) {
            const toast = document.getElementById('mensaje-exito');
            toast.textContent = mensaje; toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        // ==========================================
        // 6. RENDER DE FORMULARIOS
        // ==========================================
        function renderizarListas() {
            const selLugar = document.getElementById('select-lugar');
            selLugar.innerHTML = '<option value="">Seleccione lugar...</option>';
            lugares.forEach(l => selLugar.innerHTML += `<option value="${l.nombre}">${l.nombre}</option>`);
            selLugar.innerHTML += '<option value="nuevo_lugar">+ Nuevo lugar</option>';

            const selProd = document.getElementById('select-producto');
            const selCart = document.getElementById('select-agregar-carrito');
            selProd.innerHTML = '<option value="">Seleccione producto...</option>';
            selCart.innerHTML = '<option value="">+ Añadir a la lista...</option>';
            catalogoProductos.forEach(p => {
                selProd.innerHTML += `<option value="${p.nombre}">${p.nombre}</option>`;
                selCart.innerHTML += `<option value="${p.nombre}">${p.nombre}</option>`;
            });
            selProd.innerHTML += '<option value="nuevo_producto">+ Nuevo producto</option>';

            const selCat = document.getElementById('select-categoria');
            selCat.innerHTML = '<option value="">Seleccione categoría...</option>';
            categorias.forEach(c => selCat.innerHTML += `<option value="${c}">${c}</option>`);
            selCat.innerHTML += '<option value="nueva_categoria">+ Nueva categoría</option>';
        }

        document.getElementById('select-lugar').addEventListener('change', e => document.getElementById('input-nuevo-lugar').style.display = e.target.value === 'nuevo_lugar' ? 'block' : 'none');
        document.getElementById('select-producto').addEventListener('change', e => {
            const esNuevo = e.target.value === 'nuevo_producto';
            document.getElementById('input-nuevo-producto').style.display = esNuevo ? 'block' : 'none';
            document.getElementById('grupo-categoria').style.display = esNuevo ? 'block' : 'none';
        });

        // ==========================================
        // 7. GUARDADO CON GPS
        // ==========================================
        document.getElementById('form-producto').addEventListener('submit', (e) => {
            e.preventDefault();
            let lugar = document.getElementById('select-lugar').value;
            let producto = document.getElementById('select-producto').value;
            let precio = parseFloat(document.getElementById('input-precio').value);
            let codigo = document.getElementById('input-codigo').value || '';

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(pos => {
                    let idx = lugares.findIndex(l => l.nombre === lugar);
                    if(idx !== -1) { lugares[idx].latitud = pos.coords.latitude; lugares[idx].longitud = pos.coords.longitude; localStorage.setItem('lugaresAhorro', JSON.stringify(lugares)); }
                });
            }

            if (lugar === 'nuevo_lugar') { lugar = document.getElementById('input-nuevo-lugar').value; lugares.push({nombre: lugar, activo: true}); }
            if (producto === 'nuevo_producto') {
                producto = document.getElementById('input-nuevo-producto').value;
                catalogoProductos.push({ nombre: producto, codigos: [codigo] });
            }

            localStorage.setItem('lugaresAhorro', JSON.stringify(lugares));
            localStorage.setItem('catalogoAhorro', JSON.stringify(catalogoProductos));

            // Guardado Offline-First: synced=false
            const nuevoRegistro = { id: Date.now(), lugar, nombre: producto, codigo, precio, fecha: new Date().toISOString(), synced: false };
            productos.push(nuevoRegistro);
            localStorage.setItem('productosAhorro', JSON.stringify(productos));
            
            e.target.reset(); renderizarListas(); mostrarToast('¡Guardado localmente!');
            actualizarLED(); // Intentar sincronizar si hay red
        });

        // ==========================================
        // 8. MATRIZ (FONDO VERDE)
        // ==========================================
        function renderizarMatriz() {
            const tabla = document.getElementById('tabla-matriz'); tabla.innerHTML = '';
            const filtro = document.getElementById('input-busqueda-matriz').value.toLowerCase();
            const tiendas = [...new Set(productos.map(p => p.lugar))].sort();
            let prods = [...new Set(productos.map(p => p.nombre))].filter(n => n.toLowerCase().includes(filtro));
            
            if (tiendas.length === 0 || prods.length === 0) return;

            let thead = '<thead><tr><th>Producto</th>';
            tiendas.forEach(t => thead += `<th>${t}</th>`);
            tabla.innerHTML = thead + '</tr></thead>';

            const tbody = document.createElement('tbody');
            prods.forEach(prod => {
                const tr = document.createElement('tr');
                let htmlFila = `<td>${prod}</td>`;
                
                let ultimosPrecios = {};
                tiendas.forEach(t => {
                    const hist = productos.filter(p => p.nombre === prod && p.lugar === t).sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
                    if(hist.length > 0) ultimosPrecios[t] = hist[0].precio;
                });

                const vals = Object.values(ultimosPrecios);
                const min = vals.length > 0 ? Math.min(...vals) : null;

                tiendas.forEach(t => {
                    if(!ultimosPrecios[t]) htmlFila += `<td>-</td>`;
                    else {
                        const esMejor = (ultimosPrecios[t] === min) ? 'mejor-precio' : '';
                        htmlFila += `<td class="${esMejor}">Bs. ${ultimosPrecios[t].toFixed(2)}</td>`;
                    }
                });
                tr.innerHTML = htmlFila; tbody.appendChild(tr);
            });
            tabla.appendChild(tbody);
        }

        // ==========================================
        // 9. CARRITO (CANTIDADES DECIMALES Y MÚLTIPLOS)
        // ==========================================
        function agregarAlCarrito() {
            const val = document.getElementById('select-agregar-carrito').value;
            if(val && !carrito.find(c => c.producto === val)) {
                carrito.push({ producto: val, lugarSeleccionado: 'Auto', cantidad: 1 });
                guardarYRenderizarCarrito();
            }
            document.getElementById('select-agregar-carrito').value = '';
        }

        function cambiarCantidad(index, delta) {
            let cant = parseFloat(carrito[index].cantidad) || 0;
            cant += delta;
            if (cant < 0.1) cant = 0.1; // Mínimo
            carrito[index].cantidad = parseFloat(cant.toFixed(2));
            guardarYRenderizarCarrito();
        }

        function setCantidad(index, val) {
            let cant = parseFloat(val);
            if (isNaN(cant) || cant <= 0) cant = 1;
            carrito[index].cantidad = parseFloat(cant.toFixed(2));
            guardarYRenderizarCarrito();
        }

        function cambiarLugarCarrito(index, lugar) {
            carrito[index].lugarSeleccionado = lugar;
            guardarYRenderizarCarrito();
        }

        function quitarDelCarrito(index) {
            carrito.splice(index, 1); guardarYRenderizarCarrito();
        }

        function guardarYRenderizarCarrito() {
            localStorage.setItem('carritoActual', JSON.stringify(carrito));
            actualizarVistaCarrito();
        }

        function actualizarVistaCarrito() {
            const div = document.getElementById('lista-carrito-items'); div.innerHTML = '';
            let total = 0;
            const tiendas = [...new Set(productos.map(p => p.lugar))];

            carrito.forEach((item, index) => {
                let preciosDisponibles = {};
                tiendas.forEach(t => {
                    const hist = productos.filter(p => p.nombre === item.producto && p.lugar === t).sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
                    if(hist.length > 0) preciosDisponibles[t] = hist[0].precio;
                });

                let lugarOptimo = Object.keys(preciosDisponibles).reduce((a, b) => preciosDisponibles[a] < preciosDisponibles[b] ? a : b, null);
                let lugarAplicado = item.lugarSeleccionado === 'Auto' ? lugarOptimo : item.lugarSeleccionado;
                let precioUnitario = preciosDisponibles[lugarAplicado] || 0;
                let subtotal = precioUnitario * item.cantidad;
                total += subtotal;

                let opcionesLugar = `<option value="Auto">✨ Más barato (${lugarOptimo || 'N/A'})</option>`;
                Object.keys(preciosDisponibles).forEach(t => opcionesLugar += `<option value="${t}" ${item.lugarSeleccionado === t ? 'selected' : ''}>${t} (Bs. ${preciosDisponibles[t].toFixed(2)}/u)</option>`);

                div.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-row">
                            <strong style="font-size: 1.1em;">${item.producto}</strong>
                            <button style="background:var(--danger-color); padding: 5px 10px; border-radius: 6px;" onclick="quitarDelCarrito(${index})">X</button>
                        </div>
                        <div class="cart-row">
                            <div class="cart-controls">
                                <button onclick="cambiarCantidad(${index}, -1)">-</button>
                                <input type="number" step="0.1" value="${item.cantidad}" onchange="setCantidad(${index}, this.value)">
                                <button onclick="cambiarCantidad(${index}, 1)">+</button>
                            </div>
                            <div style="text-align: right;">
                                <div style="color:var(--success-color); font-weight:bold; font-size: 1.2em;">Bs. ${subtotal.toFixed(2)}</div>
                            </div>
                        </div>
                        <select class="cart-select" onchange="cambiarLugarCarrito(${index}, this.value)">${opcionesLugar}</select>
                    </div>`;
            });
            document.getElementById('total-carrito').textContent = `Bs. ${total.toFixed(2)}`;
        }
    </script>
</body>
</html>
